<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - WMS 日系零售選物管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --peach: #F4845F;
            --apricot: #F9C5A7;
            --caramel: #E8956D;
            --cream: #FFF0E8;
            --text: #3D2B1F;
            --muted: #8B6B5A;
            --light-bg: #FFFBF8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--light-bg) 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Decorative background */
        .background-decoration {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            position: absolute;
            top: 10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: var(--apricot);
            border-radius: 50%;
            mix-blend-mode: multiply;
            filter: blur(80px);
            opacity: 0.2;
            animation: float 8s ease-in-out infinite;
        }

        .blob-2 {
            position: absolute;
            bottom: 10%;
            left: 10%;
            width: 400px;
            height: 400px;
            background: var(--peach);
            border-radius: 50%;
            mix-blend-mode: multiply;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 10s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
        }

        /* Card */
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(244, 132, 95, 0.15);
            overflow: hidden;
            border: 1px solid rgba(249, 197, 167, 0.3);
            backdrop-filter: blur(10px);
        }

        /* Header */
        .card-header {
            background: linear-gradient(135deg, var(--peach) 0%, var(--caramel) 100%);
            padding: 3rem 2rem;
            text-align: center;
            color: white;
        }

        .card-header .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .card-header p {
            font-size: 0.875rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Form content */
        .card-body {
            padding: 2.5rem 2rem;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-text h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .welcome-text p {
            font-size: 0.875rem;
            color: var(--muted);
            font-weight: 300;
        }

        /* Form group */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        /* Input wrapper */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--caramel);
            font-size: 1.25rem;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 2px solid var(--apricot);
            border-radius: 12px;
            background: rgba(255, 240, 232, 0.5);
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 300;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--peach);
            background: white;
            box-shadow: 0 0 0 3px rgba(244, 132, 95, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(139, 107, 90, 0.5);
        }

        .form-group input.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .form-group input.error:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .error-message {
            font-size: 0.75rem;
            color: #ef4444;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Toggle password button */
        .toggle-password {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.25rem;
            transition: color 0.3s ease;
            padding: 0.25rem;
        }

        .toggle-password:hover {
            color: var(--peach);
        }

        /* Remember me & Forgot password */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--caramel);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: white;
        }

        .checkbox input {
            display: none;
        }

        .checkbox input:checked + .checkbox-visual {
            background: var(--peach);
            border-color: var(--peach);
        }

        .checkbox-visual {
            width: 20px;
            height: 20px;
            border: 2px solid var(--caramel);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: white;
        }

        .checkbox-visual::after {
            content: '✓';
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            display: none;
        }

        .checkbox input:checked + .checkbox-visual::after {
            display: block;
        }

        .remember-me label {
            color: var(--muted);
            cursor: pointer;
            font-weight: 300;
        }

        .forgot-password {
            color: var(--peach);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 300;
        }

        .forgot-password:hover {
            color: var(--caramel);
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--peach) 0%, var(--caramel) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(244, 132, 95, 0.3);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-submit .spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        .btn-submit.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            gap: 1rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--apricot), transparent);
        }

        .divider-text {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 300;
        }

        /* Social buttons */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .btn-social {
            padding: 0.875rem;
            border: 2px solid var(--apricot);
            background: rgba(255, 240, 232, 0.5);
            color: var(--text);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-social:hover:not(:disabled) {
            background: var(--cream);
            border-color: var(--peach);
            color: var(--peach);
        }

        .btn-social:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-social .icon {
            font-size: 1.25rem;
        }

        /* Sign up link */
        .signup-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--muted);
            font-weight: 300;
        }

        .signup-link a {
            color: var(--peach);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--caramel);
        }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(249, 197, 167, 0.2);
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 300;
        }

        .card-footer p {
            margin: 0.25rem 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card-body {
                padding: 2rem 1.5rem;
            }

            .card-header {
                padding: 2rem 1.5rem;
            }

            .card-header h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background decoration -->
    <div class="background-decoration">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
    </div>

    <!-- Main container -->
    <div class="container">
        <!-- Login card -->
        <div class="login-card">
            <!-- Header -->
            <div class="card-header">
                <div class="icon">🏪</div>
                <h1>WMS Selection</h1>
                <p>智慧倉儲管理系統</p>
            </div>

            <!-- Body -->
            <div class="card-body">
                <!-- Welcome text -->
                <div class="welcome-text">
                    <h2>歡迎回來</h2>
                    <p>登入您的帳戶以繼續</p>
                </div>

                <!-- Demo account info -->
                <div style="background: rgba(244, 132, 95, 0.08); border: 1px solid rgba(244, 132, 95, 0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.85rem;">
                    <p style="color: var(--text); font-weight: 500; margin-bottom: 0.5rem;">📝 演示帳號</p>
                    <p style="color: var(--muted); margin: 0.25rem 0;"><strong>帳號：</strong> a0976454270@gmail.com</p>
                    <p style="color: var(--muted); margin: 0.25rem 0;"><strong>密碼：</strong> 123456</p>
                    <button type="button" id="useDemoBtn" style="margin-top: 0.75rem; width: 100%; padding: 0.5rem; background: var(--peach); color: white; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease;" onmouseover="this.style.background='var(--caramel)'" onmouseout="this.style.background='var(--peach)'">使用演示帳號登入</button>
                </div>

                <!-- Login form -->
                <form id="loginForm">
                    <!-- Email field -->
                    <div class="form-group">
                        <label for="email">電子郵件</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉️</span>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="your@email.com"
                                required
                            />
                        </div>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <!-- Password field -->
                    <div class="form-group">
                        <label for="password">密碼</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="••••••••"
                                required
                            />
                            <button
                                type="button"
                                class="toggle-password"
                                id="togglePassword"
                                aria-label="切換密碼顯示"
                            >
                                👁️
                            </button>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <!-- Remember me & Forgot password -->
                    <div class="form-footer">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe" />
                            <div class="checkbox-visual"></div>
                            <span>記住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘記密碼？</a>
                    </div>

                    <!-- Submit button -->
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="spinner"></span>
                        <span>登入</span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">或</div>
                    <div class="divider-line"></div>
                </div>

                <!-- Social login buttons -->
                <div class="social-buttons">
                    <button type="button" class="btn-social" data-provider="google">
                        <span class="icon">🔍</span>
                        <span>Google 登入</span>
                    </button>
                    <button type="button" class="btn-social" data-provider="apple">
                        <span class="icon">🍎</span>
                        <span>Apple 登入</span>
                    </button>
                    <button type="button" class="btn-social" data-provider="github">
                        <span class="icon">💻</span>
                        <span>GitHub 登入</span>
                    </button>
                </div>

                <!-- Sign up link -->
                <div class="signup-link">
                    還沒有帳戶？
                    <a href="#">立即註冊</a>
                </div>

                <!-- Footer -->
                <div class="card-footer">
                    <p>© 2026 WMS Selection Retail Lab</p>
                    <p>庫存最佳化解決方案</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Form elements
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const submitBtn = document.getElementById('submitBtn');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const socialButtons = document.querySelectorAll('.btn-social');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? '🙈' : '👁️';
        });

        // Validate email
        const validateEmail = (email) => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        };

        // Clear errors on input
        emailInput.addEventListener('input', () => {
            emailError.classList.remove('show');
            emailInput.classList.remove('error');
        });

        passwordInput.addEventListener('input', () => {
            passwordError.classList.remove('show');
            passwordInput.classList.remove('error');
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset errors
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');

            // Validate
            let hasError = false;

            if (!emailInput.value) {
                emailError.textContent = '請輸入電子郵件';
                emailError.classList.add('show');
                emailInput.classList.add('error');
                hasError = true;
            } else if (!validateEmail(emailInput.value)) {
                emailError.textContent = '請輸入有效的電子郵件';
                emailError.classList.add('show');
                emailInput.classList.add('error');
                hasError = true;
            }

            if (!passwordInput.value) {
                passwordError.textContent = '請輸入密碼';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                hasError = true;
            } else if (passwordInput.value.length < 6) {
                passwordError.textContent = '密碼至少需要 6 個字符';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                hasError = true;
            }

            if (hasError) return;

            // Simulate login
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

                setTimeout(() => {
                const isDemo = emailInput.value === DEMO_ACCOUNT.email && passwordInput.value === DEMO_ACCOUNT.password;
                const role = isDemo ? DEMO_ACCOUNT.role : 'user';

                const loginData = {
                    email: emailInput.value,
                    password: emailInput.value === DEMO_ACCOUNT.email && passwordInput.value === DEMO_ACCOUNT.password,
                    rememberMe: rememberMeCheckbox.checked,
                    timestamp: new Date().toISOString(),
                    role: role,
                };

                console.log('Login attempt:', { ...loginData, email: emailInput.value });

                // Store login info in localStorage
                localStorage.setItem('loginData', JSON.stringify({
                    email: emailInput.value,
                    role: role,
                    loginTime: new Date().toISOString(),
                }));

                // If admin account, redirect to live demo
                if (isDemo) {
                    alert(`✅ 登入成功！\n郵件: ${emailInput.value}\n角色: 管理員\n\n正在進入實時演示...`);
                    // Redirect to live demo after 1 second
                    setTimeout(() => {
                        window.location.href = 'https://wms-retail-ft9ktzch.manus.space';
                    }, 1000);
                } else {
                    alert(`登入成功！\n郵件: ${emailInput.value}\n角色: 普通用戶\n記住我: ${loginData.rememberMe ? '是' : '否'}`);
                    // Reset form
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    togglePasswordBtn.textContent = '👁️';
                    passwordInput.type = 'password';
                }
            }, 1500);
        });

        // Handle social login
        socialButtons.forEach((btn) => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const provider = btn.dataset.provider;
                btn.disabled = true;

                setTimeout(() => {
                    console.log(`Social login with ${provider}`);
                    alert(`${provider.toUpperCase()} 登入功能已準備好！`);
                    btn.disabled = false;
                }, 1500);
            });
        });

        // Remember me functionality
        rememberMeCheckbox.addEventListener('change', () => {
            if (rememberMeCheckbox.checked) {
                localStorage.setItem('rememberMe', 'true');
                localStorage.setItem('email', emailInput.value);
            } else {
                localStorage.removeItem('rememberMe');
                localStorage.removeItem('email');
            }
        });

        // Demo account credentials
        const DEMO_ACCOUNT = {
            email: 'a0976454270@gmail.com',
            password: '123456',
            role: 'admin'
        };

        // Handle demo account button
        const useDemoBtn = document.getElementById('useDemoBtn');
        if (useDemoBtn) {
            useDemoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                emailInput.value = DEMO_ACCOUNT.email;
                passwordInput.value = DEMO_ACCOUNT.password;
                rememberMeCheckbox.checked = true;
                emailInput.focus();
            });
        }

        // Load remembered email on page load
        window.addEventListener('load', () => {
            if (localStorage.getItem('rememberMe') === 'true') {
                const savedEmail = localStorage.getItem('email');
                if (savedEmail) {
                    emailInput.value = savedEmail;
                    rememberMeCheckbox.checked = true;
                }
            }
        });

        // Console message
        console.log('%c WMS 日系零售選物管理系統 - 登入頁面', 'font-size: 16px; font-weight: bold; color: #F4845F;');
        console.log('%c 高質感 Luxury/Refined 設計', 'font-size: 12px; color: #E8956D;');
        console.log('%c 演示帳號: a0976454270@gmail.com / 密碼: 123456', 'font-size: 11px; color: #F9C5A7;');
        console.log('%c 登入後將自動進入實時演示應用', 'font-size: 11px; color: #F9C5A7;');
    </script>
</body>
</html>
